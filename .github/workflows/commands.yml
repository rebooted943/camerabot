name: ArbitrageSniper Commands

# Polls Telegram for bot commands (/scan, /search, /add, /remove, /list) and
# acts on them. Runs frequently so a "/scan" you type in the chat is picked up
# within a few minutes (GitHub may delay scheduled runs under load).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Optional one-off query to scan instead of polling commands"
        type: string
        required: false

permissions:
  contents: write

# Share the scan workflow's concurrency group so the two never race on the DB.
concurrency:
  group: arbitrage-sniper
  cancel-in-progress: false

jobs:
  listen:
    # Pinned to 22.04 (Playwright --with-deps fails on noble/24.04, libasound2).
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      CI: "true"
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      EBAY_APP_TOKEN: ${{ secrets.EBAY_APP_TOKEN }}
      HEADLESS: "true"
      MIN_DELAY: "1"
      MAX_DELAY: "2.5"
      VINTED_PER_STORE: "8"
      VINTED_MARKETS: "it,ro,fr,de,es,pl,uk,nl,be,pt,at,cz,hu"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Process Telegram commands
        run: |
          if [ -n "${{ github.event.inputs.query }}" ]; then
            python main.py --query "${{ github.event.inputs.query }}"
          else
            python main.py --listen
          fi

      - name: Commit state (DB + thresholds)
        if: ${{ always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen_ads.db thresholds.json)" ]; then
            git add seen_ads.db thresholds.json
            git commit -m "chore(state): update bot state [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase --autostash origin ${{ github.ref_name }} && \
              git push origin HEAD:${{ github.ref_name }} && break || sleep $((2**i))
            done
          else
            echo "No state changes to commit."
          fi
